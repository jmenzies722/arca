# ── Phase 2: MCP Servers ──────────────────────────────────────────────────────
# Add MCP servers here to give Arca access to their tools.
# Each server is a process that Arca spawns and connects to via stdio.
#
# Example — GitHub MCP server:
# [[mcp.servers]]
# name = "github"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-github"]
# env = { GITHUB_PERSONAL_ACCESS_TOKEN = "$GITHUB_TOKEN" }
#
# Example — Filesystem MCP server:
# [[mcp.servers]]
# name = "filesystem"
# command = "npx"
# args = ["-y", "@modelcontextprotocol/server-filesystem", "/Users/admin"]
